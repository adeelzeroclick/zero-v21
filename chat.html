<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Building with Zero · Claude Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">
<style>
:root{
  --bg:#FFFFFF; --canvas:#FBFBFA; --surface:#F4F4F2; --surface-2:#E9E9E6;
  --text:#1A1A1A; --text-2:#5E5E5E; --text-3:#9A9A97;
  --border:#E7E7E4; --border-2:#D8D8D4; --border-med:#C4C4C0;
  --mono:'DM Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  --heading:'DM Sans',var(--sans);
  --claude:#D97757; --zero:#1919FF; --zero-soft:#F1F1FF; --ok:#4A9362;
  --r:14px;
}
[data-theme="dark"]{
  --bg:#121316; --canvas:#0D0E10; --surface:#191B1E; --surface-2:#24272C;
  --text:#EDEDED; --text-2:#A0A0A0; --text-3:#6B6F74;
  --border:#23262B; --border-2:#2E3137; --border-med:#3C4046;
  --claude:#E08766; --zero:#8B8BFF; --zero-soft:#191A2E; --ok:#5EB37A;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--canvas);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* top bar */
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;height:56px;padding:0 24px;
  background:var(--bg);border-bottom:1px solid var(--border)}
.brand{display:inline-flex;align-items:center;color:var(--text);text-decoration:none}
.brand .bm{height:19px;width:auto;display:block}
.right{margin-left:auto;display:flex;align-items:center;gap:14px}
.nav-social{display:inline-flex;align-items:center;gap:13px}
.nav-social a{color:var(--text-3);display:inline-flex;transition:color .14s}
.nav-social a:hover{color:var(--text)}
.nav-social svg{display:block}
.nav-div{width:1px;height:20px;background:var(--border)}
.nav-link{font-family:var(--mono);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-2);text-decoration:none;white-space:nowrap;transition:color .14s}
.nav-link:hover{color:var(--text)}
.nav-cta{font-family:var(--mono);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--bg);background:var(--text);
  border:1px solid var(--text);border-radius:8px;padding:7px 13px;text-decoration:none;white-space:nowrap;transition:transform .14s}
.nav-cta:hover{transform:translateY(-1px)}
@media (max-width:640px){.nav-social,.nav-div,.nav-link{display:none}}
/* model selector */
.model{position:relative;display:inline-flex;align-items:center;gap:9px;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;transition:border-color .14s,box-shadow .14s}
.model:hover{border-color:var(--border-med);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.model .mdot{width:7px;height:7px;border-radius:50%;background:#22A559;flex:none;box-shadow:0 0 0 2px rgba(34,165,89,.16)}
.model .mname{font-family:var(--sans);font-weight:400;font-size:14px;line-height:18px;color:var(--text);white-space:nowrap}
.model .mchev{width:16px;height:16px;color:var(--text-3);flex:none}
.model-menu{position:absolute;top:calc(100% + 7px);right:0;min-width:340px;background:var(--bg);border:1px solid var(--border);border-radius:13px;box-shadow:0 16px 40px rgba(0,0,0,.16),0 0 0 1px rgba(0,0,0,.03);padding:6px;z-index:60;display:none}
.model.open .model-menu{display:block}
.mitem{display:block;width:100%;text-align:left;cursor:pointer;background:transparent;border:0;border-radius:9px;padding:10px 12px;transition:background .12s}
.mitem:hover,.mitem.sel{background:var(--surface)}
.mitem-top{display:flex;align-items:baseline;gap:12px}
.mitem-name{flex:1;min-width:0;font-family:var(--sans);font-weight:600;font-size:14.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mitem-price{flex:none;font-family:var(--mono);font-size:11.5px;color:var(--text-3)}
.mitem-sub{font-family:var(--sans);font-size:12.5px;line-height:17px;color:var(--text-3);margin-top:2px}
/* wallet: lowercase label + green USDC pill */
.walletwrap{display:inline-flex;align-items:center;gap:9px}
.walletwrap .wlabel{font-family:var(--sans);font-size:13px;color:var(--text-3)}
.walletpill{display:inline-flex;align-items:center;gap:4px;height:22px;padding:2px 8px;border-radius:6px;
  background:var(--bg);border:1px solid rgba(0,0,0,.1)}
.walletpill .wamt{font-family:var(--mono);font-weight:500;font-size:12px;line-height:18px;letter-spacing:.3px;text-transform:uppercase;color:#1A9E52}
.walletpill.locked .wamt{color:var(--text-3)}
.walletpill .wccy{font-family:var(--mono);font-weight:500;font-size:12px;line-height:18px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3)}
.iconbtn{width:31px;height:31px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text-2);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{color:var(--text)}.iconbtn svg{width:15px;height:15px}
/* secondary header: project + wallet + model */
.subtop{display:flex;align-items:center;gap:12px;height:60px;padding:0 24px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:19}
.proj{font-family:var(--mono);font-weight:500;font-size:12px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj b{color:var(--text-2);font-weight:500}
.subright{margin-left:auto;display:flex;align-items:center;gap:10px}
/* projects side-rail */
.rail-toggle{flex:none;width:30px;height:30px;margin-left:-4px;border:0;background:transparent;border-radius:7px;color:var(--text-2);cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .14s,color .14s}
.rail-toggle.show{display:flex}
.rail-toggle:hover{background:var(--surface);color:var(--text)}
.rail-toggle svg{width:18px;height:18px}
.rail-scrim{position:fixed;inset:0;z-index:39;background:rgba(18,18,18,.32);opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.rail-scrim.show{opacity:1;visibility:visible}
.rail{position:fixed;top:0;left:0;bottom:0;width:300px;max-width:86vw;z-index:40;background:var(--bg);border-right:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(0,0,0,.02);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,.7,.25,1)}
.rail.show{transform:none}
.rail-head{flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 18px 14px}
.rail-title{font-family:var(--heading);font-weight:600;font-size:16px;color:var(--text)}
.rail-new{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 11px 0 9px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;
  font-family:var(--sans);font-weight:500;font-size:12.5px;color:var(--text);transition:background .14s,border-color .14s}
.rail-new:hover{background:var(--surface);border-color:var(--border-med)}
.rail-new svg{width:14px;height:14px}
.rail-list{flex:1;overflow-y:auto;padding:4px 10px 16px}
.rail-item{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:10px 12px;border:0;background:transparent;border-radius:9px;cursor:pointer;transition:background .12s}
.rail-item:hover{background:var(--surface)}
.rail-item.active{background:var(--surface)}
.rail-item .ri-mark{width:16px;height:16px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--text-3)}
.rail-item.active .ri-mark{color:var(--text-2)}
.rail-item .ri-mark svg{width:14px;height:14px}
.rail-item .ri-t{flex:1;min-width:0;font-family:var(--sans);font-weight:500;font-size:14.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


/* conversation */
.scroll{flex:1;overflow-y:auto}
.thread{max-width:716px;margin:0 auto;padding:26px 20px 30px;display:flex;flex-direction:column;gap:7px}

.turn{animation:rise .34s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* user message — ChatMessage (DS 1.2): white bubble, radius 12·12·4·12, elevation-1 + inset */
.u{display:flex;justify-content:flex-end;margin:14px 0 18px}
.u .b{background:var(--bg);border:.5px solid var(--border);border-radius:12px 12px 4px 12px;
  padding:8px 12px;font-size:16px;line-height:24px;color:var(--text);max-width:80%;
  box-shadow:0 1px 1px rgba(0,0,0,.05), inset 0 -1px 0 rgba(0,0,0,.1)}

/* assistant turn */
.a{margin-top:14px}
.a.cont{margin-top:8px}
.a .c{min-width:0}

.say{font-size:16px;line-height:25px;color:var(--text)}
.say p{margin:0 0 9px}.say p:last-child{margin:0}
.say strong, .say b{font-weight:600}
.say .hl{font-weight:600}
.say em{font-style:italic;color:var(--text)}
.say .url{font-weight:600;text-decoration:underline;text-underline-offset:2px}
.say .ok{color:var(--ok)}
.say code{font-family:var(--mono);font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.5px 5px}
.caret{display:inline-block;width:2px;height:16px;background:var(--zero);margin-left:1px;vertical-align:-3px;animation:bl 1s steps(1) infinite}
@keyframes bl{50%{opacity:0}}

/* thinking */
.aistate{display:inline-flex;align-items:center;gap:8px;padding:5px 0;animation:aist 1.3s ease-in-out infinite}
.aistate .ai-ic{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;color:var(--text-2)}
.aistate .ai-ic svg{width:13px;height:13px;display:block}
.aistate .ai-lb{font-family:var(--mono);font-size:13px;line-height:15px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-2)}
@keyframes aist{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes pl{0%,100%{opacity:.3;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}

/* native tool use — Claude Code style, light (no container) */
.tstep{font-family:var(--mono);font-size:12.5px;line-height:21px;margin:11px 0}
.tstep .hd{display:flex;align-items:center;gap:8px;color:var(--text)}
.tstep .hd .mk{color:var(--zero);font-size:11px;line-height:1}
.tstep .hd .vb{color:var(--text)}
.tstep .hd .ar{color:var(--text-2)}
.tstep .hd .meta{margin-left:auto;color:var(--text-3);font-size:11px}
.tstep .res{margin:3px 0 0 5px;padding-left:14px;border-left:2px solid var(--surface-2);color:var(--text-3);white-space:pre-wrap}
.tstep .res .ok{color:var(--ok)}
.tcode{margin:5px 0 0 21px;font-family:var(--mono);font-size:12px;line-height:19px;color:var(--text-3);white-space:pre;
  overflow-x:auto;border-left:2px solid var(--surface-2);padding:0 0 0 12px}

/* plan checklist — light, no box */
.todo{margin:12px 0 4px}
.todo .h{font-family:var(--mono);font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.todo-list{position:relative}
.todo-list::before{content:'';position:absolute;left:7px;top:13px;bottom:13px;width:1px;background:var(--border)}
.ti{display:flex;align-items:center;gap:10px;padding:5px 0;position:relative}
.ti .dot{width:15px;height:15px;flex:none;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.ti .dot .d{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border-med);box-sizing:border-box;background:var(--bg);transition:all .25s}
.ti.done .dot .d{border-color:var(--ok);background:var(--ok)}
.ti.act .dot .d{border-color:var(--text);background:var(--text);box-shadow:0 0 0 3px color-mix(in srgb,var(--text) 12%,transparent)}
.ti .lb{font-family:var(--mono);font-weight:500;font-size:12px;line-height:18px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3);transition:color .25s}
.ti.done .lb{color:var(--text-2)}
.ti.act .lb{background:linear-gradient(90deg,var(--text) 25%,var(--text-3) 50%,var(--text) 75%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 1.8s linear infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── ZERO containers — the rich, on-brand moments ── */
.zc{margin:13px 0;border:1px solid var(--border);border-radius:13px;
  background:var(--bg);overflow:hidden;box-shadow:0 1px 2px rgba(20,20,40,.04)}
.zc .zh{display:flex;align-items:center;gap:9px;padding:12px 14px 6px}
.zc .zh .z{width:16px;height:16px;color:var(--text);flex:none}.zc .zh .z svg{width:100%;height:100%;display:block}
.zc .zh .t{font-family:var(--mono);font-size:12px;color:var(--text);letter-spacing:.2px}
.zc .zh .t b{color:var(--text);font-weight:500}
.zc .zh .x{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-2);
  background:var(--bg);border:1px solid rgba(0,0,0,.1);border-radius:5px;padding:2px 7px}
.zc .zb{padding:0 14px 12px}
.zq{font-family:var(--mono);font-size:12.5px;color:var(--text-2);margin-bottom:11px}
.zq .p{color:var(--text-3)}
.zr{display:flex;flex-direction:column;gap:6px;padding:11px 12px;border-bottom:1px solid var(--border);
  opacity:0;transform:translateY(4px);animation:rise .3s ease forwards}
.zr:last-child{border-bottom:0}
.zr.pick{background:var(--surface)}
.zr-head{display:flex;align-items:center;gap:8px;min-width:0}
.zr-fav{width:18px;height:18px;border-radius:5px;flex:none;display:flex;align-items:center;justify-content:center;font:600 9px/1 var(--sans);color:#fff}
.zr-host{font-family:var(--heading);font-weight:500;font-size:15px;line-height:20px;letter-spacing:.3px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 1 auto;min-width:0}
.zr-cat{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:var(--surface);flex:none;
  font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--text)}
.zr-ck{width:15px;height:15px;color:var(--ok);flex:none;opacity:0;transition:opacity .3s}
.zr.pick .zr-ck{opacity:1}
.zr-price{margin-left:auto;flex:none;display:flex;align-items:baseline;gap:4px}
.zr-price .a{font-family:var(--mono);font-weight:500;font-size:12.5px;color:var(--text-2)}
.zr-price .u{font-family:var(--mono);font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3)}
.zr-desc{font-family:var(--sans);font-size:13px;line-height:18px;color:var(--text-3);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
[data-theme="dark"] .zc .zh .x{border-color:rgba(255,255,255,.16)}
.zpay{display:flex;align-items:center;gap:10px;padding:2px 0 4px}
.zpay .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3)}
.zpay .v{font-family:var(--mono);font-size:12.5px;color:var(--text)}
.zpay .v.amt{color:var(--text);font-weight:500}.zpay .v.ok{color:var(--ok)}
.zpay .sp{flex:1}
.zout{margin-top:10px;font-family:var(--mono);font-size:12px;line-height:19px;color:var(--text);background:var(--surface);
  border:1px solid var(--border);border-radius:9px;padding:10px 12px;white-space:pre-wrap}

/* completion summary — quiet & factual, with an x402 receipt (no CTAs) */
.summary{margin:13px 0 4px;border:1px solid var(--border);border-radius:12px;background:var(--bg);padding:13px 15px}
.summary .sh{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.summary .sh .ic{width:18px;height:18px;border-radius:6px;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.summary .sh .ic svg{width:11px;height:11px}
.summary .sh .t{font-family:var(--heading);font-weight:600;font-size:14.5px;color:var(--text)}
.summary .sl{margin:0 0 11px;font-size:14px;line-height:22px;color:var(--text-2)}
.summary .sl .z{color:var(--zero);font-weight:500}
.summary .rcp{font-family:var(--mono);font-size:12px;line-height:22px}
.summary .rr{display:flex;gap:12px;align-items:baseline}
.summary .rr .h{color:var(--text)}
.summary .rr .a{color:var(--text-3)}
.summary .rr .c{margin-left:auto;color:var(--text-2)}
.summary .rr.tot{border-top:1px solid var(--border);margin-top:6px;padding-top:6px}
.summary .rr.tot .h{color:var(--text-2)}
.summary .rr.tot .c{color:var(--zero);font-weight:500}
.summary .rr.bal .h{color:var(--text-3)}
.summary .rr.bal .c{color:var(--ok);font-weight:500}

/* composer */
/* split workspace: chat column + live preview pane */
.workspace{flex:1;display:flex;min-height:0}
.chatcol{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0}
/* services build-plan panel */
.plan{flex:none;width:0;overflow:hidden;background:var(--canvas,var(--bg));border-left:1px solid var(--border);
  transition:width .46s cubic-bezier(.22,.7,.25,1)}
.workspace.show-plan .plan{width:46%}
.plan-inner{width:46vw;max-width:600px;height:100%;display:flex;flex-direction:column;box-sizing:border-box}
.plan-head{flex:none;padding:22px 26px 16px;border-bottom:1px solid var(--border)}
.plan-title{font-family:var(--heading);font-weight:600;font-size:18px;color:var(--text);margin-bottom:13px}
.plan-counts{display:flex;gap:8px}
.pc{display:inline-flex;align-items:center;gap:6px;height:25px;padding:0 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);
  font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-2)}
.pc b{color:var(--text);font-weight:500}
.pc .pic{width:13px;height:13px;color:var(--text-3);display:inline-flex}.pc .pic svg{width:100%;height:100%}
.plan-body{flex:1;overflow-y:auto;padding:20px 26px 30px}
.plan-list{position:relative;display:flex;flex-direction:column;gap:18px}
.plan-list:empty::after{content:"Services and instructions will appear here as the build runs.";display:block;
  font-family:var(--sans);font-size:13px;line-height:19px;color:var(--text-3);max-width:240px;padding:8px 2px}
.plan-list:not(:empty)::before{content:"";position:absolute;left:9px;top:8px;bottom:8px;width:1px;background:var(--border)}
.pnode{position:relative;padding-left:36px;animation:pnode-in .42s cubic-bezier(.2,.7,.3,1)}
@keyframes pnode-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pnum{position:absolute;left:0;top:15px;width:19px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--text-3);background:var(--canvas,var(--bg));padding:3px 0}
.pcard{border:1px solid var(--border);border-radius:12px;background:var(--bg);overflow:hidden}
.pcard-top{padding:15px 16px;display:flex;flex-direction:column;gap:11px}
.pcard-row1{display:flex;align-items:flex-start;gap:12px}
.pcard-name{flex:1;min-width:0;font-family:var(--heading);font-weight:600;font-size:15.5px;color:var(--text)}
.pcard-price{flex:none;text-align:right;font-family:var(--mono);font-weight:500;font-size:15px;color:var(--text);white-space:nowrap}
.pcard-price small{display:block;font-size:11px;color:var(--text-3);font-weight:500;margin-top:1px}
.pbadges{display:flex;flex-wrap:wrap;gap:6px}
.pbadge{display:inline-flex;align-items:center;gap:4px;height:21px;padding:0 7px;border:1px solid rgba(0,0,0,.08);border-radius:6px;background:var(--surface);
  font-family:var(--mono);font-weight:500;font-size:10.5px;letter-spacing:.2px;text-transform:uppercase;color:var(--text-2)}
.pbadge svg{width:11px;height:11px;display:block}
.pbadge .star{color:#E8A317;display:inline-flex}
.pcard-foot{border-top:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;min-width:0}
.pmethod,.plabel{font-family:var(--mono);font-weight:500;font-size:10.5px;letter-spacing:.4px;color:var(--zero);background:var(--zero-soft);border-radius:5px;padding:3px 7px;flex:none}
.plabel{text-transform:uppercase}
.pep{font-family:var(--mono);font-size:12.5px;color:var(--text);flex:none}
.pdesc{font-family:var(--sans);font-size:12.5px;color:var(--text-3);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-foot .end{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text-3);flex:none}
.pcard-foot.inst{flex-direction:column;align-items:flex-start;gap:9px}
.ptext{font-family:var(--mono);font-size:12.5px;line-height:18px;color:var(--text-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ptext.pt3{-webkit-line-clamp:3}
.pcard-prompt{border-color:var(--border-med)}
.pcard-prompt .ptext{color:var(--text);font-family:var(--sans);font-size:13.5px;line-height:19px}
.pcard-output{border-color:rgba(27,86,26,.32)}
.pbadge.ok{color:#1B561A;border-color:rgba(27,86,26,.25);background:#E0FAE0}
.pmethod.ok{color:#1B561A;background:#E0FAE0}
.pcard-foot .end{cursor:default}
@media(max-width:880px){.workspace.show-plan .plan{display:none}}
.preview{flex:0 0 0;width:0;min-width:0;overflow:hidden;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;transition:flex-basis .55s cubic-bezier(.2,.7,.2,1),width .55s cubic-bezier(.2,.7,.2,1)}
.workspace.has-preview .preview{flex:0 0 46%;width:46%}
.pv-bar{display:flex;align-items:center;gap:8px;height:44px;padding:0 12px;border-bottom:1px solid var(--border);background:var(--bg);flex:none}
.pv-dots{display:flex;gap:6px}.pv-dots i{width:10px;height:10px;border-radius:50%;background:var(--border-2)}
.pv-url{flex:1;min-width:0;font-family:var(--mono);font-size:11.5px;color:var(--text-2);background:var(--surface);
  border:1px solid var(--border);border-radius:7px;padding:5px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-ic{width:28px;height:28px;border:0;background:transparent;border-radius:7px;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex:none}
.pv-ic:hover{background:var(--surface);color:var(--text)}.pv-ic svg{width:15px;height:15px}
.pv-close{display:none}
.pv-body{flex:1;position:relative;background:#fff;min-height:0}
[data-theme="dark"] .pv-body{background:#0e0e10}
.pv-frame{width:100%;height:100%;border:0;background:#fff;opacity:0;transition:opacity .35s}
.pv-boot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:9px;
  font-family:var(--mono);font-size:12px;color:var(--text-3);background:var(--surface)}
.pv-boot .d{width:7px;height:7px;border-radius:50%;background:var(--zero);animation:pl 1s ease-in-out infinite}
@media (max-width:920px){
  .workspace.has-preview .preview{position:fixed;inset:54px 0 0;width:100%;flex-basis:100%;z-index:40;border-left:0}
  .pv-close{display:flex}
}
/* composer footer */
.foot{background:linear-gradient(to top,var(--canvas) 62%,transparent);padding:10px 20px 16px;flex:none}
/* composer — ChatInput (DS 1.2): white card, radius 20, 8px pad, elevation-2 shadow */
.composer{max-width:716px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);border:.5px solid var(--border);
  border-radius:20px;padding:8px;
  box-shadow:0 1px .5px rgba(0,0,0,.04),0 3px 1.5px rgba(0,0,0,.04),0 6px 3px rgba(0,0,0,.04),0 8px 16px -8px rgba(0,0,0,.06)}
.ci-text{display:flex;padding:8px}
.ci-text input{flex:1;border:0;outline:0;background:transparent;font-family:var(--sans);font-size:16px;line-height:24px;color:var(--text)}
.ci-text input::placeholder{color:var(--text-2)}
.ci-actions{display:flex;align-items:center;justify-content:space-between}
.ci-right{display:flex;align-items:center;gap:2px}
.ci-btn{width:40px;height:40px;border:0;background:transparent;border-radius:9999px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.ci-btn:hover{background:var(--surface);color:var(--text)}
.ci-btn svg{width:20px;height:20px}
.cs{width:40px;height:40px;border:0;border-radius:9999px;background:var(--surface);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.cs svg{width:17px;height:17px}
.composer.filled .cs{background:var(--text);color:var(--bg)}
/* decision choices (above the composer) */
.choices{max-width:716px;margin:0 auto 10px;display:none;gap:10px;flex-wrap:wrap}
.choices.show{display:flex}
.choices.rich{flex-direction:column;flex-wrap:nowrap}
.choice{display:inline-flex;align-items:center;gap:8px;padding:10px 15px;border-radius:12px;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:border-color .14s,transform .14s}
.choice:hover{border-color:var(--border-med);transform:translateY(-1px)}
.choice.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.choice.ghost{color:var(--text-2)}
.choice .ic{width:16px;height:16px;display:inline-flex;flex:none}.choice .ic svg{width:100%;height:100%;display:block}
/* rich decision card (elicitation style) */
.qcard{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:16px;
  box-shadow:0 1px 1px -.5px rgba(0,0,0,.04),0 8px 22px -6px rgba(0,0,0,.10)}
.qhead{font-family:var(--heading);font-weight:600;font-size:16px;line-height:22px;color:var(--text);margin:0 0 12px;padding:0 4px}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  background:var(--surface);border:1px solid transparent;border-radius:12px;padding:13px 13px 13px 15px;transition:background .14s,border-color .14s}
.qopt:hover{background:var(--surface-2);border-color:var(--border)}
.qopt-b{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.qopt-t{font-family:var(--sans);font-weight:600;font-size:15px;line-height:21px;color:var(--text)}
.qopt-t .recb{display:inline-block;margin-left:8px;vertical-align:2px;font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:#fff;background:var(--zero);border-radius:5px;padding:2px 6px;line-height:1.35}
.qopt-d{font-family:var(--sans);font-size:13px;line-height:19px;color:var(--text-3)}
.qkey{flex:none;width:27px;height:27px;border:1px solid var(--border);border-radius:7px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--text-3)}
/* blocker card (AI-only dead-end) */
.blocker{margin:12px 0;border:1px solid var(--border);border-radius:12px;background:var(--bg);padding:14px;display:flex;gap:12px;align-items:flex-start}
.blocker .bic{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--border);flex:none;display:flex;align-items:center;justify-content:center;color:var(--text-2)}
.blocker .bic svg{width:16px;height:16px}
.blocker .bt{font-family:var(--heading);font-weight:600;font-size:14px;color:var(--text)}
.blocker .bb{font-size:13px;line-height:19px;color:var(--text-2);margin-top:3px}
.blocker .bcta{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-family:var(--mono);font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3);text-decoration:none}
.blocker .bcta:hover{color:var(--text-2)}.blocker .bcta svg{width:12px;height:12px}
.hintbar{max-width:716px;margin:9px auto 0;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--text-3)}
.hintbar b{color:var(--zero);font-weight:500}
@media (max-width:560px){.meter .l{display:none}}
/* blue text caret */
#ci{caret-color:var(--zero)}
/* sign-up modal (Zero onboarding) */
.modal-scrim{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
  background:rgba(18,18,18,.46);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);opacity:0;transition:opacity .22s}
.modal-scrim.show{opacity:1}
.modal{width:100%;max-width:436px;background:var(--bg);border:1px solid var(--border);border-radius:16px;
  box-shadow:0 24px 70px rgba(0,0,0,.30);padding:32px 30px 28px;text-align:center;
  transform:translateY(10px) scale(.985);transition:transform .24s cubic-bezier(.2,.7,.3,1)}
.modal-scrim.show .modal{transform:none}
.su-brand{display:flex;justify-content:center;margin:0 auto 18px;color:#191919}
.su-brand svg{height:26px;width:auto;display:block}
[data-theme="dark"] .su-brand{color:#fff}
.su-h{font-family:var(--heading);font-weight:700;font-size:22px;color:var(--text);margin:0 0 18px}
/* sign-in form */
.su-form{display:flex;flex-direction:column;gap:10px;text-align:left}
.su-label{font-family:var(--sans);font-weight:600;font-size:12.5px;color:var(--text)}
.su-input{height:44px;border:1px solid var(--border);border-radius:10px;background:var(--bg);padding:0 14px;box-sizing:border-box;
  font-family:var(--sans);font-size:14px;color:var(--text);outline:none;caret-color:var(--zero);transition:border-color .14s}
.su-input::placeholder{color:var(--text-3)}
.su-input:focus{border-color:var(--border-med)}
.su-continue,.su-google{height:44px;width:100%;border-radius:10px;cursor:pointer;font-family:var(--sans);font-weight:500;font-size:14px;transition:opacity .14s,background .14s,border-color .14s}
.su-continue{border:0;background:var(--text);color:var(--bg);margin-top:2px}
.su-continue:hover{opacity:.9}
.su-or{display:flex;align-items:center;gap:12px;margin:18px 0}
.su-or::before,.su-or::after{content:"";flex:1;height:1px;background:var(--border)}
.su-or span{font-family:var(--sans);font-weight:500;font-size:11px;color:#9e9e9e}
.su-gwrap{position:relative}
.su-google{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
.su-google:hover{background:var(--surface);border-color:var(--border-med)}
.su-google svg{flex:none}
.su-lastused{position:absolute;top:-10px;right:18px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;font-family:var(--sans);font-weight:500;font-size:10.5px;color:#737373}
.su-legal{font-family:var(--sans);font-size:12px;line-height:18px;color:var(--text-3);text-align:left;margin:18px 0 0}
.su-legal b{color:var(--text-2);font-weight:400}
/* setting-up step */
.su-loaderwrap{display:flex;justify-content:center;margin:8px 0 2px}
.su-loader{width:46px;height:46px;border:4px solid var(--surface);border-top-color:var(--text);border-radius:50%;animation:su-rot .8s linear infinite}
@keyframes su-rot{to{transform:rotate(360deg)}}
.su-bigtitle{font-family:var(--heading);font-weight:600;font-size:26px;line-height:32px;letter-spacing:-.3px;color:var(--text);margin:20px 0 6px}
.su-bigsub{font-family:var(--sans);font-size:15px;line-height:22px;color:var(--text-3);margin:0 0 4px}
/* welcome-bonus step */
.su-bonus{text-align:left}
.su-instbar{font-family:var(--mono);font-weight:500;font-size:12px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3);text-align:left;
  margin:0 -30px 18px;padding:0 30px 16px;border-bottom:1px dashed var(--border-med)}
.su-pill{display:inline-flex;align-items:stretch;border-radius:5px;overflow:hidden;margin:0 0 16px;animation:su-pop .42s cubic-bezier(.2,.8,.3,1.2)}
.su-pill .ck{display:flex;align-items:center;justify-content:center;width:24px;background:#1B561A;color:#fff}
.su-pill .ck svg{width:13px;height:13px}
.su-pill .lb{display:flex;align-items:center;padding:0 12px;background:#E0FAE0;color:#1B561A;
  font-family:var(--mono);font-weight:500;font-size:12px;letter-spacing:.3px;text-transform:uppercase}
@keyframes su-pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.su-baline{font-family:var(--sans);font-weight:500;font-size:16px;color:var(--text);margin:0 0 8px}
.su-baval{font-family:var(--mono);font-weight:500;font-size:46px;letter-spacing:-1.5px;color:#1B561A;margin:0}
.su-redir{border-top:1px dashed var(--border-med);margin-top:24px;padding-top:24px;text-align:left}
.su-redir p{font-family:var(--sans);font-size:14px;color:var(--text-2);margin:0 0 12px}
.su-ticks{display:flex;gap:2px;height:10px;overflow:hidden}
.su-ticks i{flex:1;height:100%;background:var(--border);border-radius:.5px}
.su-ticks i.on{background:var(--text)}
.confetti-wrap{position:fixed;inset:0;z-index:210;pointer-events:none;overflow:hidden}
.confetti-wrap i{position:absolute;width:8px;height:13px;border-radius:1px;will-change:transform,opacity}
</style>

  var colors=['#1B561A','#2E7D32','#3FA34D','#52B788','#5FBF6B','#74C476','#8FD694','#A5D6A7','#C8E6C9'];
  var wrap=document.createElement('div'); wrap.className='confetti-wrap'; document.body.appendChild(wrap);
  var cx=(ox!=null?ox:window.innerWidth/2), cy=(oy!=null?oy:window.innerHeight*0.42);
  var R=function(a,b){ return a+Math.random()*(b-a); };
  for(var i=0;i<90;i++){
    var p=document.createElement('i'); p.style.background=colors[i%colors.length];
    var sz=R(4,10); p.style.width=sz.toFixed(1)+'px'; p.style.height=(sz*R(0.6,1.3)).toFixed(1)+'px';
    p.style.left=cx+'px'; p.style.top=cy+'px'; if(i%3===0) p.style.borderRadius='50%';
    /* radial explosion: shoot outward, decelerate, fade in place — no gravity */
    var ang=Math.random()*Math.PI*2, dist=R(70,300);
    var dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    var rot=(Math.random()*2-1)*240, peak=R(0.82,1);
    var dur=950+Math.random()*750, delay=Math.random()*90;
    p.animate([
      {transform:'translate(0px,0px) scale(.4) rotate(0deg)', opacity:0, offset:0,  easing:'cubic-bezier(.12,.8,.28,1)'},
      {opacity:peak, offset:.12},
      {transform:'translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px) scale(1) rotate('+(rot*0.8).toFixed(0)+'deg)', opacity:peak, offset:.6, easing:'cubic-bezier(.25,.6,.35,1)'},
      {transform:'translate('+(dx*1.1).toFixed(1)+'px,'+(dy*1.1).toFixed(1)+'px) scale(.95) rotate('+rot.toFixed(0)+'deg)', opacity:0, offset:1}
    ], {duration:dur, delay:delay, fill:'forwards'});
    wrap.appendChild(p);
  }
  setTimeout(function(){ if(wrap.parentNode) wrap.parentNode.removeChild(wrap); }, 2400);
}

async function openPreview(url, srcdoc){
  var ws=document.getElementById('workspace'), pv=document.getElementById('preview');
  var urlEl=document.getElementById('pv-url'), boot=document.getElementById('pv-boot'), frame=document.getElementById('pv-frame');
  urlEl.textContent=url;

  boot.style.display='flex'; frame.style.opacity='0';
  await sleep(680);
  frame.onload=function(){ boot.style.display='none'; frame.style.opacity='1'; };
  frame.srcdoc=srcdoc;

  await sleep(700);
}

/* Zero/AI decision gate — shown on every prompt so the user can sign up & unlock $5 */
async function gate(cfg){
  aiTurn();
  await say(cfg.snag);
  var choice = await decide({
    question:'How do you want to proceed?',
    options:[
      {v:'zero', title:'Continue with Zero services', recommended:true, desc:cfg.zeroDesc},
      {v:'ai', title:'Continue with '+MODELNAME, desc:cfg.aiDesc}
    ]
  });
  if(choice==='ai'){
    aiTurn();
    await say(cfg.ai1);
    if(cfg.ai2) await say(cfg.ai2);
    blocker(cfg.blocker);
    aiTurn();
    await say(cfg.pivot);
    await decide({ question:'How do you want to proceed?',
      options:[{v:'zero', title:'Try with Zero', recommended:true, desc:cfg.tryDesc}] });
  }
  await signup();
}

/* projects side-rail */
(function(){
  var toggle=document.getElementById('rail-toggle'), rail=document.getElementById('rail'), scrim=document.getElementById('rail-scrim'),
      list=document.getElementById('rail-list'), newBtn=document.getElementById('rail-new');
  if(!toggle||!rail) return;
  var MARK_DOTS='<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="3.2" cy="8" r="1.25"/><circle cx="8" cy="8" r="1.25"/><circle cx="12.8" cy="8" r="1.25"/></svg>';
  var MARK_RING='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="8" r="4.6"/></svg>';
  var PAST=[
    {name:'Sales outreach', prompt:'Find new leads and email them by 9am'},
    {name:'Pixel Dash', prompt:'Build a browser game from one prompt'},
    {name:'Scroll motion recreate', prompt:'Recreate scroll motion from a video'},
    {name:'Onboarding email series', prompt:'Write a 5-part onboarding email series'},
    {name:'Competitor teardown', prompt:'Research my top 3 competitors and summarize'},
    {name:'Landing page rebuild', prompt:'Rebuild my landing page from this reference'},
    {name:'Market scan digest', prompt:'Summarize the latest in my market'},
    {name:'Pricing page experiment', prompt:'Draft 3 pricing page variants to A/B test'},
    {name:'Cold outreach v2', prompt:'Find leads and draft cold outreach'}
  ];
  var active=projName();
  var SESSIONS=[{name:active, active:true}];
  PAST.forEach(function(s){ if(s.name!==active) SESSIONS.push(s); });
  function open(){ scrim.classList.add('show'); rail.classList.add('show'); }
  function close(){ scrim.classList.remove('show'); rail.classList.remove('show'); }
  function go(prompt){ location.href='chat.html?agent='+encodeURIComponent(AGENT)+'&model='+encodeURIComponent(MODELNAME)+'&prompt='+encodeURIComponent(prompt); }
  list.innerHTML = SESSIONS.map(function(s,i){
    return '<button class="rail-item'+(s.active?' active':'')+'" type="button" data-i="'+i+'">'+
      '<span class="ri-mark">'+(s.active?MARK_DOTS:MARK_RING)+'</span>'+
      '<span class="ri-t">'+esc(s.name)+'</span></button>';
  }).join('');
  list.querySelectorAll('.rail-item').forEach(function(b){
    b.addEventListener('click', function(){ var s=SESSIONS[+b.getAttribute('data-i')]; if(s.active){ close(); return; } go(s.prompt); });
  });
  toggle.addEventListener('click', function(){ rail.classList.contains('show')?close():open(); });
  scrim.addEventListener('click', close);
  if(newBtn) newBtn.addEventListener('click', function(){ location.href='index.html'; });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
})();
